<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QA Bug Report – Classic Intranet</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0e0e0f;
    color: #e8e6e1;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 960px; margin: 0 auto; }

  /* ── Header ── */
  .header { margin-bottom: 2rem; border-bottom: 0.5px solid #2a2a2e; padding-bottom: 1.25rem; }
  .header .eyebrow {
    font-size: 12px; color: #555552; text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 8px;
  }
  .header h1 { font-size: 26px; font-weight: 600; color: #f0ede8; margin-bottom: 4px; }
  .header .meta { font-size: 13px; color: #555552; }

  /* ── Summary Cards ── */
  .summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: #18181b;
    border-radius: 12px;
    border: 0.5px solid #2a2a2e;
    padding: 16px 18px;
  }
  .stat-card .label { font-size: 12px; color: #555552; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 600; color: #f0ede8; }
  .stat-card.high   { background: #1e1010; border-color: #3d1a1a; }
  .stat-card.high   .label { color: #f09595; }
  .stat-card.high   .value { color: #f09595; }
  .stat-card.medium { background: #1c1508; border-color: #3b2a08; }
  .stat-card.medium .label { color: #fac775; }
  .stat-card.medium .value { color: #fac775; }
  .stat-card.live   { background: #1a0e15; border-color: #3a1530; }
  .stat-card.live   .label { color: #ed93b1; }
  .stat-card.live   .value { color: #ed93b1; }

  /* ── Filters ── */
  .filters {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 1.5rem; align-items: center;
  }
  .filters input,
  .filters select {
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 0.5px solid #2a2a2e;
    background: #18181b;
    color: #e8e6e1;
    outline: none;
    transition: border-color 0.15s;
  }
  .filters input { flex: 1 1 180px; }
  .filters input::placeholder { color: #444441; }
  .filters input:focus,
  .filters select:focus { border-color: #534ab7; }
  .filters select option { background: #18181b; color: #e8e6e1; }

  /* ── Bug Cards ── */
  .bug-list { display: flex; flex-direction: column; gap: 10px; }

  .bug-card {
    background: #18181b;
    border: 0.5px solid #2a2a2e;
    border-radius: 12px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 0 14px;
    align-items: start;
    transition: border-color 0.15s, background 0.15s;
  }
  .bug-card:hover { border-color: #3a3a3e; background: #1e1e22; }

  .bug-id {
    font-size: 12px; font-weight: 600; color: #3a3a3e;
    padding-top: 2px; text-align: center;
  }

  .bug-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; margin-bottom: 8px;
  }

  .tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }

  .tag-module-um     { background: #0c2340; color: #85b7eb; }
  .tag-module-quot   { background: #1a1535; color: #afa9ec; }
  .tag-module-prod   { background: #1c1508; color: #fac775; }
  .tag-module-qs     { background: #061f18; color: #5dcaa5; }
  .tag-module-dash   { background: #1a0e15; color: #ed93b1; }
  .tag-module-export { background: #1e100a; color: #f0997b; }

  .tag-sev { display: flex; align-items: center; gap: 5px; }
  .sev-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  .tag-high   { background: #1e1010; color: #f09595; }
  .tag-medium { background: #1c1508; color: #fac775; }
  .tag-low    { background: #0d1a08; color: #c0dd97; }
  .dot-high   { background: #e24b4a; }
  .dot-medium { background: #ef9f27; }
  .dot-low    { background: #97c459; }

  .tag-date { font-size: 11px; color: #444441; padding: 3px 0; }

  .bug-desc { font-size: 14px; line-height: 1.65; color: #c8c6c1; margin-bottom: 6px; }
  .bug-remark { font-size: 12px; color: #444441; }

  /* ── Status Column ── */
  .bug-status {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 6px; min-width: 110px;
  }
  .status-row { display: flex; align-items: center; gap: 6px; }
  .status-label { font-size: 11px; color: #444441; }

  .pill { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .pill-yes  { background: #0d1a08; color: #c0dd97; }
  .pill-no   { background: #1e1010; color: #f09595; }
  .pill-na   { background: #1c1c1e; color: #555552; }
  .pill-done { background: #0a1f15; color: #5dcaa5; margin-top: 2px; }

  /* ── Divider ── */
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #444441; margin-bottom: 8px; margin-top: 6px;
  }

  /* ── Empty ── */
  .empty { text-align: center; padding: 3rem 1rem; font-size: 14px; color: #444441; }

  /* ── Footer ── */
  .footer { margin-top: 2rem; text-align: right; font-size: 12px; color: #2a2a2e; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0e0e0f; }
  ::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 4px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .bug-card { grid-template-columns: 32px 1fr; }
    .bug-status { grid-column: 2; flex-direction: row; flex-wrap: wrap; justify-content: flex-start; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <p class="eyebrow">Classic Intranet &nbsp;·&nbsp; QA Cycle</p>
    <h1>Bug Report</h1>
    <p class="meta">Period: 31 Mar – 10 Apr 2026 &nbsp;·&nbsp; <span id="total-count">10</span> issues logged &nbsp;·&nbsp; All resolved &nbsp;·&nbsp; Source: Frontend</p>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="stat-card">
      <div class="label">Total bugs</div>
      <div class="value" id="stat-total">10</div>
    </div>
    <div class="stat-card high">
      <div class="label">High severity</div>
      <div class="value">5</div>
    </div>
    <div class="stat-card medium">
      <div class="label">Medium severity</div>
      <div class="value">3</div>
    </div>
    <div class="stat-card live">
      <div class="label">Unverified on live</div>
      <div class="value">5</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input type="text" id="search" placeholder="Search bugs…" oninput="applyFilters()"/>
    <select id="modFilter" onchange="applyFilters()">
      <option value="">All Modules</option>
      <option>User Management</option>
      <option>Quotations</option>
      <option>Products</option>
      <option>Quotation Summary</option>
      <option>Dashboard – Pagination</option>
      <option>Quotations – Export</option>
    </select>
    <select id="sevFilter" onchange="applyFilters()">
      <option value="">All Severities</option>
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>
  </div>

  <!-- Bug List -->
  <div class="bug-list" id="bugList"></div>

  <div class="footer">Generated 10 Apr 2026 &nbsp;·&nbsp; Classic Intranet QA</div>
</div>

<script>
const bugs = [
  { id:1,  date:"31 Mar 2026", module:"User Management",        sev:"Low",    staging:true,  live:true,  desc:"Changing user to Roles page — roles not highlighted after navigation.", remark:"Frontend issue" },
  { id:10, date:"02 Apr 2026", module:"Quotations",             sev:"Medium", staging:true,  live:true,  desc:"Client Details: Address textarea resizing broken; Address 2 overlaps textarea border.", remark:"UI issue" },
  { id:12, date:"02 Apr 2026", module:"Quotations",             sev:"High",   staging:true,  live:true,  desc:"Quote Settings tab — after filling Document, Address & Created By, no Save/Submit button appears.", remark:"" },
  { id:20, date:"10 Apr 2026", module:"Products",               sev:"High",   staging:true,  live:false, desc:"Editing a product on last pages fails — clicking Edit shows 'Product not found'.", remark:"" },
  { id:23, date:"10 Apr 2026", module:"Quotation Summary",      sev:"High",   staging:true,  live:false, desc:"Dashboard › Quotation Summary — viewing any quote does not display added products.", remark:"" },
  { id:24, date:"10 Apr 2026", module:"Dashboard – Pagination", sev:"Medium", staging:true,  live:false, desc:"Quotation Summary, Confirmed Orders, Outstanding Items, Audit Trail, Export Status — pagination unusable for large data (page-by-page only).", remark:"" },
  { id:25, date:"10 Apr 2026", module:"Quotations",             sev:"Medium", staging:true,  live:null,  desc:"After status changes to 'Order Confirmed', navigating to Quotes Version and back clears the status display.", remark:"" },
  { id:26, date:"10 Apr 2026", module:"Quotations – Export",    sev:"High",   staging:true,  live:false, desc:"Exported PDF shows blank fields for: Dates, Representative, Telephone, Email Address.", remark:"" },
  { id:27, date:"10 Apr 2026", module:"Quotations – Export",    sev:"Low",    staging:true,  live:null,  desc:"Export dropdown missing Excel icon — should be added.", remark:"" },
  { id:28, date:"10 Apr 2026", module:"Quotations – Export",    sev:"High",   staging:true,  live:null,  desc:"Exporting quotes to Excel produces a blank workbook — no data populated.", remark:"Blank Excel sheet" },
];

const moduleClass = {
  "User Management":        "tag-module-um",
  "Quotations":             "tag-module-quot",
  "Products":               "tag-module-prod",
  "Quotation Summary":      "tag-module-qs",
  "Dashboard – Pagination": "tag-module-dash",
  "Quotations – Export":    "tag-module-export",
};

function pill(v) {
  if (v === true)  return `<span class="pill pill-yes">Yes</span>`;
  if (v === false) return `<span class="pill pill-no">No</span>`;
  return `<span class="pill pill-na">—</span>`;
}

function renderBugs(list) {
  const el = document.getElementById("bugList");
  document.getElementById("stat-total").textContent = list.length;
  document.getElementById("total-count").textContent = list.length;
  if (!list.length) {
    el.innerHTML = `<div class="empty">No bugs match your filters.</div>`;
    return;
  }
  el.innerHTML = list.map(b => `
    <div class="bug-card">
      <div class="bug-id">#${b.id}</div>
      <div class="bug-body">
        <div class="bug-tags">
          <span class="tag ${moduleClass[b.module]}">${b.module}</span>
          <span class="tag tag-sev tag-${b.sev.toLowerCase()}">
            <span class="sev-dot dot-${b.sev.toLowerCase()}"></span>${b.sev}
          </span>
          <span class="tag-date">${b.date}</span>
        </div>
        <p class="bug-desc">${b.desc}</p>
        ${b.remark ? `<p class="bug-remark">&#x2192; ${b.remark}</p>` : ""}
      </div>
      <div class="bug-status">
        <div class="status-row"><span class="status-label">Staging</span>${pill(b.staging)}</div>
        <div class="status-row"><span class="status-label">Live</span>${pill(b.live)}</div>
        <span class="pill pill-done">&#10003; Done</span>
      </div>
    </div>
  `).join("");
}

function applyFilters() {
  const q   = document.getElementById("search").value.toLowerCase();
  const mod = document.getElementById("modFilter").value;
  const sev = document.getElementById("sevFilter").value;
  renderBugs(bugs.filter(b =>
    (!mod || b.module === mod) &&
    (!sev || b.sev === sev) &&
    (!q   || b.desc.toLowerCase().includes(q) || b.module.toLowerCase().includes(q))
  ));
}

renderBugs(bugs);
</script>
</body>
</html>
